<!DOCTYPE html>
<html>
<head>
  <title>Study Helper</title>
  <style>
    body {
      margin: 0;
      padding: 12px;
      background: #ffffff;
      color: #111827;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-width: 280px;
    }

    .container {
      display: grid;
      gap: 8px;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 4px;
      font-weight: 600;
    }

    button {
      padding: 9px 10px;
      background: #111827;
      border: 0;
      color: #ffffff;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      font-weight: 600;
    }

    button:hover {
      background: #374151;
    }

    input {
      box-sizing: border-box;
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      font-size: 13px;
    }

    #result {
      padding: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      color: #111827;
      font-size: 14px;
      line-height: 1.4;
      min-height: 42px;
      max-height: 180px;
      overflow-y: auto;
    }

    .loader {
      border: 3px solid #e5e7eb;
      border-top: 3px solid #111827;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MCQ Answer</h1>
    <input id="apiKeyInput" type="password" placeholder="Gemini API key" />
    <button id="saveKeyBtn">Save Key</button>
    <button id="searchBtn">Get Answer</button>
    <div id="result">Highlight a question with options, then click Get Answer.</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
